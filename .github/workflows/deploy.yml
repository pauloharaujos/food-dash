name: 'FoodDash Infrastructure & Deployment'

on:
  push:
    branches: [ "feature/implement-terraform-for-aws-infrastructure" ]

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  NODE_VERSION: '20'

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'terraform/') ||
      contains(github.event.head_commit.added, 'terraform/')
    defaults:
      run:
        working-directory: terraform
    outputs:
      app_url: ${{ steps.output.outputs.app_url }}
      codedeploy_artifacts_bucket: ${{ steps.output.outputs.codedeploy_artifacts_bucket }}
      codedeploy_application_name: ${{ steps.output.outputs.codedeploy_application_name }}
      codedeploy_deployment_group_name: ${{ steps.output.outputs.codedeploy_deployment_group_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (remote state)
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=fooddash/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - id: output
        run: |
          echo "app_url=$(terraform output -raw app_url)" >> $GITHUB_OUTPUT
          echo "codedeploy_artifacts_bucket=$(terraform output -raw codedeploy_artifacts_bucket)" >> $GITHUB_OUTPUT
          echo "codedeploy_application_name=$(terraform output -raw codedeploy_application_name)" >> $GITHUB_OUTPUT
          echo "codedeploy_deployment_group_name=$(terraform output -raw codedeploy_deployment_group_name)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: [terraform]
    if: always()
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build NestJS bundle
        run: |
          npm ci --ignore-scripts
          npx prisma generate
          npm run build

      - name: Assemble CodeDeploy revision
        run: |
          STAGE=$(mktemp -d)
          cp -r dist package.json package-lock.json prisma "$STAGE/"
          cp codedeploy/appspec.yml "$STAGE/"
          mkdir -p "$STAGE/scripts"
          cp codedeploy/scripts/*.sh "$STAGE/scripts/"
          chmod +x "$STAGE/scripts/"*.sh
          (cd "$STAGE" && zip -r "$GITHUB_WORKSPACE/bundle.zip" .)

      - name: Upload revision to S3
        env:
          BUCKET: ${{ needs.terraform.outputs.codedeploy_artifacts_bucket || vars.CODEDEPLOY_BUCKET }}
        run: |
          KEY="deployments/${{ github.sha }}.zip"
          aws s3 cp bundle.zip "s3://${BUCKET}/${KEY}"
          echo "DEPLOY_KEY=$KEY" >> $GITHUB_ENV
          echo "DEPLOY_BUCKET=$BUCKET" >> $GITHUB_ENV

      - name: Create CodeDeploy deployment
        env:
          APP: ${{ needs.terraform.outputs.codedeploy_application_name || vars.CODEDEPLOY_APP }}
          DG: ${{ needs.terraform.outputs.codedeploy_deployment_group_name || vars.CODEDEPLOY_DG }}
        run: |
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP" \
            --deployment-group-name "$DG" \
            --s3-location "bucket=${DEPLOY_BUCKET},key=${DEPLOY_KEY},bundleType=zip" \
            --file-exists-behavior OVERWRITE \
            --query deploymentId \
            --output text)
          echo "Waiting for deployment $DEPLOY_ID..."
          aws deploy wait deployment-successful --deployment-id "$DEPLOY_ID"

      - name: App URL
        run: echo "App available at ${{ needs.terraform.outputs.app_url || vars.APP_URL }}"
