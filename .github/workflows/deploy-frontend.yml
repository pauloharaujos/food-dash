name: 'FoodDash Frontend — Build & Deploy'

on:
  push:
    branches: [ "feature/implement-terraform-for-aws-infrastructure" ]
    paths:
      - 'frontend/**'
      - 'terraform/frontend/**'

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  NODE_VERSION: '20'

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/frontend/**'
            frontend:
              - 'frontend/**'

  terraform-frontend:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform/frontend
    outputs:
      cloudfront_url:              ${{ steps.tf-output.outputs.cloudfront_url }}
      cloudfront_distribution_id:  ${{ steps.tf-output.outputs.cloudfront_distribution_id }}
      frontend_bucket_name:        ${{ steps.tf-output.outputs.frontend_bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init (remote state)
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=fooddash/frontend.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - id: tf-output
        run: |
          echo "cloudfront_url=$(terraform output -raw cloudfront_url)" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "frontend_bucket_name=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-frontend]
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend == 'true' ||
       needs.terraform-frontend.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_GRAPHQL_HTTP_URL: ${{ vars.VITE_GRAPHQL_HTTP_URL }}
          VITE_GRAPHQL_WS_URL: ${{ vars.VITE_GRAPHQL_WS_URL }}
        run: npm run build

      - name: Sync to S3
        env:
          BUCKET: ${{ needs.terraform-frontend.outputs.frontend_bucket_name || vars.FRONTEND_BUCKET }}
        run: |
          aws s3 sync frontend/dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ needs.terraform-frontend.outputs.cloudfront_distribution_id || vars.CLOUDFRONT_DIST_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

      - name: Frontend URL
        run: |
          echo "Frontend available at ${{ needs.terraform-frontend.outputs.cloudfront_url || vars.CLOUDFRONT_URL }}"
