version: 0.0
os: linux
files:
  - source: /
    destination: /opt/fooddash
permissions:
  - object: /opt/fooddash
    owner: ubuntu
    group: ubuntu
    type:
      - file
      - directory
hooks:
  ApplicationStop:
    - location: scripts/application_stop.sh
      timeout: 120
      runas: root
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 600
      runas: ubuntu
  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 120
      runas: ubuntu
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: ubuntu
